<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begin Journey | Organic Ink Auth</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 Grid -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <!-- Theme Flash Prevention -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <button id="theme-toggle" class="theme-toggle">🌿 Light</button>

    <div class="container container-custom min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="card-organic registration-card">
            <h1>Begin your journey</h1>
            <p class="text-muted mb-5">Join our community of mindful developers.</p>

            <form id="register-form">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="johndoe" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                </div>

                <div class="form-group">
                    <label for="password">Choose Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" data-target="password">👁</button>
                    </div>
                    <div class="password-strength-container">
                        <div id="strength-bar" class="strength-bar"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-2">
                        <small id="strength-label" class="mono strength-label">Too short</small>
                        <small class="mono text-muted small">8+ characters recommended</small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" data-target="confirm_password">👁</button>
                    </div>
                </div>

                <button type="submit" id="register-btn" class="btn-organic mt-4">Create Account ✦</button>
            </form>

            <div class="text-center mt-5 pt-4 border-top">
                <p class="text-muted">Already have an account? <a href="login.html" class="mono" style="color: var(--primary-accent); text-decoration: none; font-weight: 600;">Re-enter Space</a></p>
            </div>
        </div>
    </div>

    <footer class="footer-organic">
        <div class="container text-center">
            <p class="mono small mb-3">Made with intention by <span style="color: var(--primary-accent); font-weight: 600;">Kritika Benjwal</span></p>
            <div class="footer-links">
                <a href="https://github.com/Kritika11052005" target="_blank">Github</a>
                <a href="https://www.linkedin.com/in/kritika-benjwal/" target="_blank">LinkedIn</a>
                <a href="mailto:ananaya.benjwal@gmail.com">Email</a>
            </div>
            <p class="text-label small mt-4">© 2026 Organic Ink. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ink_canvas.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
